name: Auto Post to note.com

on:
  push:
    branches:
      - main
    paths:
      - "articles/*.md"
      - ".github/sync-platforms.json"

concurrency:
  group: post-to-note-${{ github.ref }}
  cancel-in-progress: false

jobs:
  post-to-note:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_PAT }}

      - name: Fetch tracking data from tracking-data branch
        run: |
          if git fetch origin tracking-data 2>/dev/null; then
            git show origin/tracking-data:scripts/note-posted.json > scripts/note-posted.json 2>/dev/null || true
          fi

      - name: Check if note posting is enabled
        id: config
        run: |
          ENABLED=$(jq -r '.platforms.note.enabled' .github/sync-platforms.json)
          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.config.outputs.enabled == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Find newly added or modified articles
        if: steps.config.outputs.enabled == 'true'
        id: changed
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- 'articles/*.md' | tr '\n' ' ')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "変更された記事: $CHANGED"

      - name: Post articles to note.com
        if: steps.config.outputs.enabled == 'true' && steps.changed.outputs.files != ''
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
        run: |
          for file in ${{ steps.changed.outputs.files }}; do
            echo "投稿中: $file"
            python scripts/post-to-note.py "$file" || echo "警告: $file の投稿に失敗しました"
          done

      - name: Save tracking to tracking-data branch
        if: steps.config.outputs.enabled == 'true'
        run: |
          cp scripts/note-posted.json /tmp/tracking.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin tracking-data > /dev/null 2>&1; then
            git fetch origin tracking-data
            git checkout -- .
            git checkout -b tracking-data-tmp origin/tracking-data
          else
            git checkout --orphan tracking-data-tmp
            git rm -rf . || true
          fi
          mkdir -p scripts
          cp /tmp/tracking.json scripts/note-posted.json
          git add scripts/note-posted.json
          if git diff --staged --quiet; then
            echo "追跡ファイルに変更なし"
          else
            git commit -m "chore: Update note.com posting tracking"
            for i in 1 2 3 4 5; do
              if git ls-remote --exit-code origin tracking-data > /dev/null 2>&1; then
                git pull --rebase origin tracking-data 2>/dev/null || true
              fi
              git push origin tracking-data-tmp:tracking-data && break
              echo "push失敗、リトライ $i/5"
              sleep $((i * 3))
            done
          fi
