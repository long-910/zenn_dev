name: Auto Post to Hatena Blog

on:
  push:
    branches:
      - main
    paths:
      - "articles/*.md"
      - ".github/sync-platforms.json"
  workflow_dispatch:
    inputs:
      force:
        description: "投稿済み記事も強制更新する (--force)"
        type: boolean
        default: false
      article:
        description: "対象記事ファイル名 (例: 2026-03-13-claude-code-hooks.md)"
        type: string
        default: ""

concurrency:
  group: post-to-hatena-${{ github.ref }}
  cancel-in-progress: false

jobs:
  post-to-hatena:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_PAT }}

      - name: Check if Hatena posting is enabled
        id: config
        run: |
          ENABLED=$(jq -r '.platforms.hatena.enabled' .github/sync-platforms.json)
          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.config.outputs.enabled == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Find newly added or modified articles
        if: steps.config.outputs.enabled == 'true'
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.article }}" ]; then
            CHANGED="articles/${{ inputs.article }}"
          else
            CHANGED=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- 'articles/*.md' | tr '\n' ' ')
          fi
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "変更された記事: $CHANGED"

      - name: Post articles to Hatena Blog
        if: steps.config.outputs.enabled == 'true' && steps.changed.outputs.files != ''
        env:
          HATENA_ID: ${{ secrets.HATENA_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          for file in ${{ steps.changed.outputs.files }}; do
            echo "投稿中: $file"
            python scripts/post-to-hatena.py $FORCE_FLAG "$file" || echo "警告: $file の投稿に失敗しました"
          done

      - name: Commit updated tracking file
        if: steps.config.outputs.enabled == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/hatena-posted.json
          if git diff --staged --quiet; then
            echo "追跡ファイルに変更なし"
          else
            git commit -m "chore: Update Hatena posting tracking [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push origin main && break
              echo "push失敗、リトライ $i/5"
              sleep $((i * 3))
            done
          fi
