name: Manual Sync to Platforms

on:
  workflow_dispatch:
    inputs:
      article:
        description: "記事ファイル名 (例: 2026-03-13-claude-code-hooks.md、空欄で未同期記事を全件処理)"
        required: false
        type: string
        default: ""
      sync_qiita:
        description: "Qiitaに同期する"
        type: boolean
        default: true
      sync_hatena:
        description: "はてなブログに同期する"
        type: boolean
        default: true
      sync_zhihu:
        description: "Zhihuに同期する"
        type: boolean
        default: false
      force:
        description: "投稿済み記事も強制更新する（重複投稿注意）"
        type: boolean
        default: false

jobs:
  sync-qiita:
    if: inputs.sync_qiita == true
    runs-on: ubuntu-latest
    concurrency:
      group: post-to-qiita-manual
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Fetch tracking data from tracking-data branch
        run: |
          if git fetch origin tracking-data 2>/dev/null; then
            git show origin/tracking-data:scripts/qiita-posted.json > scripts/qiita-posted.json 2>/dev/null || true
          fi

      - name: Check if Qiita posting is enabled
        id: config
        run: |
          ENABLED=$(jq -r '.platforms.qiita.enabled' .github/sync-platforms.json)
          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.config.outputs.enabled == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Sync to Qiita
        if: steps.config.outputs.enabled == 'true'
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force }}" = "true" ]; then FORCE_FLAG="--force"; fi
          if [ -n "${{ inputs.article }}" ]; then
            FILE_ARG="articles/${{ inputs.article }}"
          else
            FILE_ARG="--all"
          fi
          python scripts/post-to-qiita.py $FORCE_FLAG $FILE_ARG

      - name: Save tracking to tracking-data branch
        if: steps.config.outputs.enabled == 'true'
        run: |
          cp scripts/qiita-posted.json /tmp/tracking.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin tracking-data > /dev/null 2>&1; then
            git fetch origin tracking-data
            git checkout -b tracking-data-tmp origin/tracking-data
          else
            git checkout --orphan tracking-data-tmp
            git rm -rf . || true
          fi
          mkdir -p scripts
          cp /tmp/tracking.json scripts/qiita-posted.json
          git add scripts/qiita-posted.json
          if git diff --staged --quiet; then
            echo "追跡ファイルに変更なし"
          else
            git commit -m "chore: Update Qiita posting tracking"
            for i in 1 2 3 4 5; do
              if git ls-remote --exit-code origin tracking-data > /dev/null 2>&1; then
                git pull --rebase origin tracking-data 2>/dev/null || true
              fi
              git push origin tracking-data-tmp:tracking-data && break
              echo "push失敗、リトライ $i/5"
              sleep $((i * 3))
            done
          fi

  sync-hatena:
    if: inputs.sync_hatena == true
