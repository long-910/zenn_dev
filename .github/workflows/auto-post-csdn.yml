name: Auto Post to CSDN

on:
  push:
    branches:
      - main
    paths:
      - "articles/*.md"
      - ".github/sync-platforms.json"

concurrency:
  group: post-to-csdn-${{ github.ref }}
  cancel-in-progress: false

jobs:
  post-to-csdn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_PAT }}

      - name: Check if CSDN posting is enabled
        id: config
        run: |
          ENABLED=$(jq -r '.platforms.csdn.enabled' .github/sync-platforms.json)
          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.config.outputs.enabled == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Find newly added or modified articles
        if: steps.config.outputs.enabled == 'true'
        id: changed
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- 'articles/*.md' | tr '\n' ' ')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "еӨүжӣҙгҒ•гӮҢгҒҹиЁҳдәӢ: $CHANGED"

      - name: Post articles to CSDN
        if: steps.config.outputs.enabled == 'true' && steps.changed.outputs.files != ''
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          CSDN_COOKIE: ${{ secrets.CSDN_COOKIE }}
        run: |
          for file in ${{ steps.changed.outputs.files }}; do
            echo "жҠ•зЁҝдёӯ: $file"
            python scripts/post-to-csdn.py "$file" || echo "иӯҰе‘Ҡ: $file гҒ®жҠ•зЁҝгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ"
          done

      - name: Commit updated tracking file
        if: steps.config.outputs.enabled == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/csdn-posted.json
          if git diff --staged --quiet; then
            echo "иҝҪи·Ўгғ•гӮЎгӮӨгғ«гҒ«еӨүжӣҙгҒӘгҒ—"
          else
            git commit -m "chore: Update CSDN posting tracking [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push origin main && break
              echo "pushеӨұж•—гҖҒгғӘгғҲгғ©гӮӨ $i/5"
              sleep $((i * 3))
            done
          fi
